// ─────────────────────────────────────────────────────────────────────────────
// GLYPH DEFINITIONS
// Each glyph is a list of strokes. Each stroke is a polyline of [x,y] in 0..1.
// We sample every stroke into a fixed number of points (STROKE_PTS) so that
// all glyphs have exactly MAX_STROKES strokes × STROKE_PTS points.
// Morphing = linear interpolation between two such fixed-size vertex buffers.
// ─────────────────────────────────────────────────────────────────────────────

const STROKE_PTS   = 20;   // points sampled per stroke
const MAX_STROKES  = 10;   // all glyphs padded to this many strokes
const VERTS_PER_G  = MAX_STROKES * STROKE_PTS; // vertices per glyph
const FLOATS_PER_V = 2;    // x, y

// Cubic bezier sampler
function cubicPt(p0,p1,p2,p3,t){
  const u=1-t;
  return [
    u*u*u*p0[0]+3*u*u*t*p1[0]+3*u*t*t*p2[0]+t*t*t*p3[0],
    u*u*u*p0[1]+3*u*u*t*p1[1]+3*u*t*t*p2[1]+t*t*t*p3[1]
  ];
}
function quadPt(p0,p1,p2,t){
  const u=1-t;
  return [u*u*p0[0]+2*u*t*p1[0]+t*t*p2[0], u*u*p0[1]+2*u*t*p1[1]+t*t*p2[1]];
}

// Sample a "path" definition into STROKE_PTS equally-spaced points.
// Path def: array of segments, each { type:'L'|'Q'|'C'|'arc'|'ellipse', pts:[[x,y],...] }
function sampleStroke(segs, n) {
  // First collect dense points along the path
  const dense = [];
  for (const seg of segs) {
    const s = 40;
    if (seg.type === 'L') {
      const [a,b] = seg.pts;
      for (let i=0;i<=s;i++) { const t=i/s; dense.push([a[0]+t*(b[0]-a[0]), a[1]+t*(b[1]-a[1])]); }
    } else if (seg.type === 'Q') {
      const [a,b,c] = seg.pts;
      for (let i=0;i<=s;i++) dense.push(quadPt(a,b,c,i/s));
    } else if (seg.type === 'C') {
      const [a,b,c,d] = seg.pts;
      for (let i=0;i<=s;i++) dense.push(cubicPt(a,b,c,d,i/s));
    } else if (seg.type === 'arc') {
      // seg.cx, seg.cy, seg.rx, seg.ry, seg.a0, seg.a1
      for (let i=0;i<=s;i++) {
        const a = seg.a0 + (seg.a1-seg.a0)*i/s;
        dense.push([seg.cx+Math.cos(a)*seg.rx, seg.cy+Math.sin(a)*seg.ry]);
      }
    }
  }
  if (dense.length === 0) return Array(n).fill([0.5,0.5]);
  // Resample to exactly n points by arc-length parameterization
  const lens = [0];
  for (let i=1;i<dense.length;i++) {
    const dx=dense[i][0]-dense[i-1][0], dy=dense[i][1]-dense[i-1][1];
    lens.push(lens[i-1]+Math.sqrt(dx*dx+dy*dy));
  }
  const total = lens[lens.length-1];
  const result = [];
  for (let i=0;i<n;i++) {
    const target = total*i/(n-1);
    let j = lens.findIndex(l=>l>=target);
    if (j<0) { result.push(dense[dense.length-1]); continue; }
    if (j===0) { result.push(dense[0]); continue; }
    if (j>=dense.length) { result.push(dense[dense.length-1]); continue; }
    const t = (target-lens[j-1])/(lens[j]-lens[j-1]+1e-9);
    result.push([dense[j-1][0]+t*(dense[j][0]-dense[j-1][0]), dense[j-1][1]+t*(dense[j][1]-dense[j-1][1])]);
  }
  return result;
}

// Build a fixed-size vertex buffer for a glyph given its stroke definitions
// strokes: array of segment arrays (each is passed to sampleStroke)
// Pads with a degenerate zero-length stroke at centroid if fewer than MAX_STROKES
function buildGlyphVerts(strokes) {
  // Compute arc length per stroke
  const S = 60;
  const strokeData = []; // {dense, lens, arcLen}
  let totalArcLen = 0;
  
  for (const stroke of strokes) {
    let dense = [];
    for (const seg of stroke) {
      const s = S;
      if (seg.type === 'L') {
        const [a,b] = seg.pts;
        for (let i=0;i<=s;i++){const t=i/s;dense.push([a[0]+t*(b[0]-a[0]),a[1]+t*(b[1]-a[1])]);}
      } else if (seg.type === 'Q') {
        const [a,b,c] = seg.pts;
        for(let i=0;i<=s;i++) dense.push(quadPt(a,b,c,i/s));
      } else if (seg.type === 'C') {
        const [a,b,c,d] = seg.pts;
        for(let i=0;i<=s;i++) dense.push(cubicPt(a,b,c,d,i/s));
      } else if (seg.type === 'arc') {
        for(let i=0;i<=s;i++){const a=seg.a0+(seg.a1-seg.a0)*i/s;dense.push([seg.cx+Math.cos(a)*seg.rx,seg.cy+Math.sin(a)*seg.ry]);}
      }
    }
    if (dense.length < 2) { strokeData.push({dense:[[0.5,0.5],[0.5,0.5]],lens:[0,0],arcLen:0}); continue; }

    const lens = [0];
    for (let i=1;i<dense.length;i++){
      const dx=dense[i][0]-dense[i-1][0],dy=dense[i][1]-dense[i-1][1];
      lens.push(lens[i-1]+Math.sqrt(dx*dx+dy*dy));
    }
    const arcLen = lens[lens.length-1];
    strokeData.push({dense, lens, arcLen});
    totalArcLen += arcLen;
  }

  function samplePathAt(sd, targetLen) {
    const {dense, lens} = sd;
    if (!lens || lens.length < 2) return dense[0] || [0.5,0.5];
    let j = lens.findIndex(l => l >= targetLen);
    if (j < 0) return dense[dense.length-1];
    if (j === 0) return dense[0];
    const t = (targetLen - lens[j-1]) / (lens[j] - lens[j-1] + 1e-9);
    return [dense[j-1][0]+t*(dense[j][0]-dense[j-1][0]), dense[j-1][1]+t*(dense[j][1]-dense[j-1][1])];
  }

  if (totalArcLen < 0.001) {
    return new Float32Array(MAX_STROKES * STROKE_PTS * 2).fill(0.5);
  }

  // Assign stroke SLOTS proportional to arc length, minimum 1 slot per real stroke
  const nReal = strokeData.filter(s => s.arcLen > 0).length;
  const slotAssign = []; // slotAssign[strokeIdx] = number of slots
  let slotsLeft = MAX_STROKES;

  // First pass: assign 1 slot per real stroke
  for (let i = 0; i < strokeData.length; i++) {
    if (strokeData[i].arcLen > 0) {
      slotAssign.push(1);
      slotsLeft--;
    } else {
      slotAssign.push(0);
    }
  }

  // Second pass: distribute remaining slots proportionally by arc length
  while (slotsLeft > 0) {
    // Find which stroke would benefit most from an extra slot
    // (the one with the highest arc-length-per-slot ratio)
    let bestIdx = -1, bestRatio = 0;
    for (let i = 0; i < strokeData.length; i++) {
      if (slotAssign[i] === 0) continue;
      const ratio = strokeData[i].arcLen / slotAssign[i];
      if (ratio > bestRatio) { bestRatio = ratio; bestIdx = i; }
    }
    if (bestIdx < 0) break;
    slotAssign[bestIdx]++;
    slotsLeft--;
  }

  // Build vertex buffer: each assigned slot gets STROKE_PTS points along its stroke
  const flat = new Float32Array(MAX_STROKES * STROKE_PTS * 2);
  let slotIdx = 0;
  for (let si = 0; si < strokeData.length; si++) {
    const nSlots = slotAssign[si];
    if (nSlots === 0) continue;
    const sd = strokeData[si];
    const totalPts = nSlots * STROKE_PTS;
    
    for (let slot = 0; slot < nSlots; slot++) {
      for (let p = 0; p < STROKE_PTS; p++) {
        const globalPtIdx = slot * STROKE_PTS + p;
        const target = sd.arcLen * globalPtIdx / (totalPts - 1);
        const pt = samplePathAt(sd, target);
        const fi = (slotIdx * STROKE_PTS + p) * 2;
        flat[fi] = pt[0];
        flat[fi+1] = pt[1];
      }
      slotIdx++;
    }
  }

  // Fill any remaining slots (if strokes.length was 0) with center
  while (slotIdx < MAX_STROKES) {
    for (let p = 0; p < STROKE_PTS; p++) {
      const fi = (slotIdx * STROKE_PTS + p) * 2;
      flat[fi] = 0.5;
      flat[fi+1] = 0.5;
    }
    slotIdx++;
  }

  return flat;
}

// Compute the bounding box aspect ratio (w/h) of a glyph's vertex buffer
// Returns the ratio of content width to content height, ignoring degenerate ghost strokes
function computeGlyphAspect(flat) {
  let x0=Infinity,x1=-Infinity,y0=Infinity,y1=-Infinity;
  for(let i=0;i<flat.length;i+=2){
    x0=Math.min(x0,flat[i]);x1=Math.max(x1,flat[i]);
    y0=Math.min(y0,flat[i+1]);y1=Math.max(y1,flat[i+1]);
  }
  const w=x1-x0,h=y1-y0;
  if(w<0.001||h<0.001)return 1.0;
  return w/h;
}
// Coords in [0,1]×[0,1], y=0 top

// Generate true Archimedean spiral as L-segment stroke

// Subdivide curved sections of letter strokes to add more control points
// This keeps the exact original corner positions but adds intermediate points
// along gentle curves using Chaikin subdivision (only between smooth junctions)
function subdivideLetterStroke(stroke) {
  const hasOnlyLines = stroke.every(s => s.type === 'L');
  if (!hasOnlyLines || stroke.length < 3) return stroke;
  
  // Extract control points
  const pts = [stroke[0].pts[0]];
  for (const seg of stroke) pts.push(seg.pts[seg.pts.length - 1]);
  
  // Classify corners
  function angleAt(i) {
    if (i <= 0 || i >= pts.length - 1) return 0;
    const ax = pts[i][0]-pts[i-1][0], ay = pts[i][1]-pts[i-1][1];
    const bx = pts[i+1][0]-pts[i][0], by = pts[i+1][1]-pts[i][1];
    const la = Math.sqrt(ax*ax+ay*ay), lb = Math.sqrt(bx*bx+by*by);
    if (la < 0.001 || lb < 0.001) return 0;
    return (ax*bx+ay*by)/(la*lb); // cosine of angle
  }
  
  // Find runs of smooth points (cos > 0.3 = angle < ~72°)
  // For each smooth run, apply Chaikin subdivision to add points
  // Then rebuild as L-segments
  const isSharp = pts.map((_, i) => i === 0 || i === pts.length-1 || angleAt(i) < 0.55);
  
  // Build refined point list
  let refined = [];
  let runStart = 0;
  
  while (runStart < pts.length) {
    if (isSharp[runStart]) {
      refined.push(pts[runStart]);
      runStart++;
      continue;
    }
    // Find the end of this smooth run
    let runEnd = runStart;
    while (runEnd < pts.length && !isSharp[runEnd]) runEnd++;
    
    // Include the sharp points on either side as anchors
    const anchorStart = Math.max(0, runStart - 1);
    const anchorEnd = Math.min(pts.length - 1, runEnd);
    
    // Extract the run including anchors
    let run = pts.slice(anchorStart, anchorEnd + 1);
    
    // Chaikin subdivide this run 3 times, but pin the first and last points
    for (let pass = 0; pass < 3; pass++) {
      const next = [run[0]];
      for (let i = 0; i < run.length - 1; i++) {
        const [ax,ay] = run[i], [bx,by] = run[i+1];
        next.push([ax*0.75+bx*0.25, ay*0.75+by*0.25]);
        next.push([ax*0.25+bx*0.75, ay*0.25+by*0.75]);
      }
      next.push(run[run.length-1]);
      run = next;
    }
    
    // Add run points (skip first if it's already the last point added)
    const startIdx = (refined.length > 0 && 
      Math.abs(refined[refined.length-1][0]-run[0][0]) < 0.001 && 
      Math.abs(refined[refined.length-1][1]-run[0][1]) < 0.001) ? 1 : 0;
    for (let i = startIdx; i < run.length; i++) refined.push(run[i]);
    
    runStart = runEnd;
  }
  
  // Rebuild as L-segments
  const result = [];
  for (let i = 0; i < refined.length - 1; i++) {
    result.push({type:'L', pts:[refined[i], refined[i+1]]});
  }
  return result;
}

// CROP GLYPH INFRASTRUCTURE
// ═══════════════════════════════════════════════════════════════════════════
function clipAndRemapStroke(strokeSegs, x0, y0, x1, y1) {
  const dense = [], S = 200;
  for (const seg of strokeSegs) {
    if (seg.type==='L') { const[a,b]=seg.pts; for(let i=0;i<=S;i++){const t=i/S;dense.push([a[0]+t*(b[0]-a[0]),a[1]+t*(b[1]-a[1])]);} }
    else if (seg.type==='Q') { const[a,b,c]=seg.pts; for(let i=0;i<=S;i++){const t=i/S,u=1-t;dense.push([u*u*a[0]+2*u*t*b[0]+t*t*c[0],u*u*a[1]+2*u*t*b[1]+t*t*c[1]]);} }
    else if (seg.type==='C') { const[a,b,c,d]=seg.pts; for(let i=0;i<=S;i++){const t=i/S,u=1-t;dense.push([u*u*u*a[0]+3*u*u*t*b[0]+3*u*t*t*c[0]+t*t*t*d[0],u*u*u*a[1]+3*u*u*t*b[1]+3*u*t*t*c[1]+t*t*t*d[1]]);} }
    else if (seg.type==='arc') { for(let i=0;i<=S;i++){const a2=seg.a0+(seg.a1-seg.a0)*i/S;dense.push([seg.cx+Math.cos(a2)*seg.rx,seg.cy+Math.sin(a2)*seg.ry]);} }
  }
  if (dense.length<2) return [];
  // Slightly expand clip rect to catch boundary-adjacent points
  const eps=0.002;
  const cx0=x0-eps,cy0=y0-eps,cx1=x1+eps,cy1=y1+eps;
  const rw=x1-x0, rh=y1-y0;
  function intersect(p0,p1){
    const dx=p1[0]-p0[0],dy=p1[1]-p0[1];let tMin=0,tMax=1;
    for(const[num,den]of[[cx0-p0[0],dx],[p0[0]-cx1,-dx],[cy0-p0[1],dy],[p0[1]-cy1,-dy]]){
      if(Math.abs(den)<1e-12){if(num>1e-6)return null;}
      else{const t=num/den;if(den>0)tMin=Math.max(tMin,t);else tMax=Math.min(tMax,t);}
    }
    if(tMin>tMax+1e-6)return null;
    return [[p0[0]+tMin*dx,p0[1]+tMin*dy],[p0[0]+tMax*dx,p0[1]+tMax*dy]];
  }
  function remap(p){return [Math.max(0,Math.min(1,(p[0]-x0)/rw)),Math.max(0,Math.min(1,(p[1]-y0)/rh))];}
  const segments=[]; let current=null;
  for(let i=0;i<dense.length-1;i++){
    const clip=intersect(dense[i],dense[i+1]);
    if(clip){
      const a=remap(clip[0]),b=remap(clip[1]);
      if(!current){current=[a];}
      const last=current[current.length-1];
      if(Math.abs(last[0]-a[0])+Math.abs(last[1]-a[1])>0.05){
        if(current.length>=2)segments.push(current);current=[a];}
      current.push(b);
    } else {if(current&&current.length>=2)segments.push(current);current=null;}
  }
  if(current&&current.length>=2)segments.push(current);
  return segments;
}

function buildCropGlyph(letterDef,localC,localR,lCols,lRows){
  const x0=localC/lCols,x1=(localC+1)/lCols,y0=localR/lRows,y1=(localR+1)/lRows;
  const strokes=[];
  for(const strokeSegs of letterDef){
    for(const seg of clipAndRemapStroke(strokeSegs,x0,y0,x1,y1)){
      if(seg.length>=2){const s=[];for(let i=0;i<seg.length-1;i++)s.push({type:'L',pts:[seg[i],seg[i+1]]});strokes.push(s);}
    }
  }
  // Merge strokes that share an endpoint (within tolerance) into connected chains
  const MERGE_EPS=0.01;
  let merged=true;
  while(merged){
    merged=false;
    for(let i=0;i<strokes.length&&!merged;i++){
      const si=strokes[i];
      const siLast=si[si.length-1].pts[1];
      for(let j=0;j<strokes.length&&!merged;j++){
        if(i===j)continue;
        const sj=strokes[j];
        const sjFirst=sj[0].pts[0];
        const d=Math.sqrt((siLast[0]-sjFirst[0])**2+(siLast[1]-sjFirst[1])**2);
        if(d<MERGE_EPS){
          // Merge j onto the end of i
          strokes[i]=si.concat(sj);
          strokes.splice(j,1);
          merged=true;
        }
      }
    }
  }
  return strokes;
}

function rasterizeLetterCells(letterDef,lCols,lRows){
  const occ=new Set();
  for(let r=0;r<lRows;r++)for(let c=0;c<lCols;c++)
    if(buildCropGlyph(letterDef,c,r,lCols,lRows).length>0)occ.add(c+','+r);
  return occ;
}

// ═══════════════════════════════════════════════════════════════════════════
// Build crop glyphs for a given LETTER_COLS/ROWS. Returns {cropMap, cropVerts, N_TOTAL, ...}
// Called at startup and on resize when grid dimensions change.
// ═══════════════════════════════════════════════════════════════════════════
function buildAllCrops(LC, LR, SC, LG, COLS, ROWS) {

  const LETTER_OCCUPIED = {};
  for (const ch of LETTER_KEYS) LETTER_OCCUPIED[ch] = rasterizeLetterCells(BANNER_LETTERS[ch], LC, LR);

  const cropGlyphMap = {}, cropGlyphVerts = [];
  let nextCropIdx = N_GLYPHS + N_LETTERS;

  // Underline
  const UL_OCCUPIED = rasterizeLetterCells(UNDERLINE_DEF, LC, 1);

  for (const ch of LETTER_KEYS) {
    const occ = LETTER_OCCUPIED[ch];
    for (let r = 0; r < LR; r++) for (let c = 0; c < LC; c++) {
      if (!occ.has(c+','+r)) continue;
      const crop = buildCropGlyph(BANNER_LETTERS[ch], c, r, LC, LR);
      cropGlyphMap[ch+','+c+','+r] = nextCropIdx;
      cropGlyphVerts.push(buildGlyphVerts(crop)); nextCropIdx++;
    }
  }
  for (let c = 0; c < LC; c++) {
    if (!UL_OCCUPIED.has(c+',0')) continue;
    const crop = buildCropGlyph(UNDERLINE_DEF, c, 0, LC, 1);
    cropGlyphMap['_,'+c+',0'] = nextCropIdx;
    cropGlyphVerts.push(buildGlyphVerts(crop)); nextCropIdx++;
  }

  // Build text map
  let totalCols = 0;
  for (const ch of PHRASE) { if (ch===' ') totalCols+=SC+LG; else totalCols+=LC+LG; }
  totalCols -= LG;
  const startCol = Math.round((COLS-totalCols)/2), startRow = Math.round((ROWS-LR)/2);
  const textMap = {};
  let col = startCol, ii = 0, dCol = -1;
  for (const ch of PHRASE) {
    if (ch===' ') { col+=SC+LG; ii++; continue; }
    const lIdx = LETTER_KEYS.indexOf(ch);
    if (lIdx<0) { col+=LC+LG; ii++; continue; }
    if (ch==='D') dCol = col;
    const occ = LETTER_OCCUPIED[ch];
    for (let r=0;r<LR;r++) for (let c=0;c<LC;c++) {
      if (!occ.has(c+','+r)) continue;

  // Draw a precomputed ribbon, scaled and translated to screen position

  requestAnimationFrame(frame);

  // ═══════════════════════════════════════════════════════════════════

  let drawing=false,drawPoints=[];

  function drawLiveTrace(){}

    else{const cnt=new Array(N_GLYPHS).fill(0);const us=new Set(userDrawnSlots);
      for(const cs of cellStates){if(cs.bannerGlyph>=0)continue;const g=cs.morphT<0.5?cs.glyphA:cs.glyphB;
        if(g>=0&&g<N_GLYPHS&&!us.has(g))cnt[g]++;}ri=0;for(let i=1;i<N_GLYPHS;i++)if(cnt[i]>cnt[ri])ri=i;}
    userDrawnSlots.push(ri);

    if(userGlyphSlotBase>=0&&userGlyphCount<MAX_USER_GLYPHS){
      const es=userGlyphSlotBase+userGlyphCount;
      device.queue.writeBuffer(glyphBuf,es*VERTS_PER_G*2*4,GLYPH_VERTS[ri]);
      // Save old aspect before overwriting
      const oldAspect=new Float32Array([computeGlyphAspect(GLYPH_VERTS[ri])]);
      device.queue.writeBuffer(aspectBuf,es*4,oldAspect);
      GLYPH_VERTS[ri]=nv;GLYPH_ASPECTS[ri]=computeGlyphAspect(nv);userGlyphCount++;}
    else{GLYPH_VERTS[ri]=nv;GLYPH_ASPECTS[ri]=computeGlyphAspect(nv);}
    device.queue.writeBuffer(glyphBuf,ri*VERTS_PER_G*2*4,nv);
    device.queue.writeBuffer(aspectBuf,ri*4,new Float32Array([GLYPH_ASPECTS[ri]]));

    // Spawn 25 floaters
    // Convert screen-space draw center to grid coordinate space (undo zoom/pan)
    const halfW=window.innerWidth/2, halfH=window.innerHeight/2;
    const gridBcx=((bcx-halfW)/zoomLevel - panX*halfW/zoomLevel) + halfW;
    const gridBcy=((bcy-halfH)/zoomLevel + panY*halfH/zoomLevel) + halfH;
    const gridSize=size/zoomLevel;
    const excl=new Set();
    const ribbon=precomputeRibbon(nv, ri*2.399);
    for(let i=0;i<25;i++){
      const sx2=gridBcx+(Math.random()-0.5)*gridSize*0.4,sy2=gridBcy+(Math.random()-0.5)*gridSize*0.4;
      const tg=findTarget(ri,excl,sx2,sy2);excl.add(tg.row*COLS+tg.col);
      floaters.push({x:sx2,y:sy2,vx:(Math.random()-0.5)*2,vy:(Math.random()-0.5)*2,
        tc:tg.col,tr:tg.row,ribbon:ribbon,gi:ri,a:0.75,age:0,
        sz:gridSize,esz:Math.min(CELL_W,CELL_H)/dpr*1.2});
    }
  }
  cv.addEventListener('mousedown',startDraw);cv.addEventListener('mousemove',moveDraw);
  cv.addEventListener('mouseup',endDraw);cv.addEventListener('mouseleave',function(e){panning=false;endDraw(e);});
  cv.addEventListener('contextmenu',function(e){e.preventDefault();});
  cv.addEventListener('touchstart',startDraw,{passive:false});
  cv.addEventListener('touchmove',moveDraw,{passive:false});
  cv.addEventListener('touchend',function(e){
    // If fingers drop from 2 to 1 during pinch, just end the pinch — don't start drawing
    if(pinching){
      e.preventDefault();
      if(e.touches.length<=1)pinching=false;
      return;
    }
    endDraw(e);
  },{passive:false});
  cv.addEventListener('touchcancel',function(e){
    pinching=false;drawing=false;
  },{passive:false});

  // Wheel: trackpad scroll = pan, trackpad pinch (ctrlKey) or mouse wheel = zoom
  cv.addEventListener('wheel',function(e){
    e.preventDefault();
    if(e.ctrlKey){
      // Pinch-to-zoom gesture (trackpad) or Ctrl+wheel
      const clipX=(e.clientX/window.innerWidth)*2-1;
      const clipY=-((e.clientY/window.innerHeight)*2-1);
      const oldZoom=zoomLevel;
      // deltaY is negative for zoom-in on trackpad pinch
      const factor=Math.exp(-e.deltaY*0.01);
      zoomLevel=Math.max(MIN_ZOOM,Math.min(MAX_ZOOM,zoomLevel*factor));
      panX=panX+clipX*(oldZoom-zoomLevel);
      panY=panY+clipY*(oldZoom-zoomLevel);
    } else {
      // Two-finger scroll = pan (screen-solidary)
      panX-=e.deltaX*2/window.innerWidth;
      panY+=e.deltaY*2/window.innerHeight;
    }
    clampPan();
  },{passive:false});

  // Double-tap to reset zoom (but not right after a pinch)
  let lastTap=0;
  cv.addEventListener('touchend',function(e){
    if(e.touches.length>0)return;
    const now=Date.now();
    if(justPinched){justPinched=false;lastTap=0;return;}
    if(now-lastTap<300){
      zoomLevel=1.0;panX=0;panY=0;lastTap=0;
    } else {
      lastTap=now;
    }
  },{passive:true});
}
function fallback(msg){document.getElementById('err').style.display='block';
  document.getElementById('err').textContent=msg+' — WebGPU: Chrome/Edge 113+.';
  document.getElementById('cv').style.display='none';}
main().catch(e=>fallback(e.message));
</script>
</body>
